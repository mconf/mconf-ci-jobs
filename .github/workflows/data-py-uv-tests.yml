name: Run tests
on:
  workflow_call:
    inputs:
      SRC_PATH:
        type: string
        required: true
      TESTS_PATH:
        type: string
        required: true
      python-version:
        type: string
        required: true
      pytest-markers:
        type: string
        required: false
        default: 'not integration'
      coverage-omit:
        type: string
        required: false
        default: ''
      runs-on:
        type: string
        required: false
        default: '["self-hosted", "ubuntu-22.04"]'
      working-directory:
        description: 'Subdirectory containing the Python project (uv.lock, pyproject.toml). Defaults to repo root.'
        type: string
        required: false
        default: '.'
permissions:
  pull-requests: write
  contents: read
jobs:
  test-and-check-coverage:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    name: Test and Check Coverage
    timeout-minutes: 15
    # Service containers spun up for every run of this template — Postgres
    # (with pgvector) and Redis. Projects that don't need them get a small
    # bootstrap overhead but no extra config; projects that do (Abel, future
    # Mconf Python services) just connect via TEST_DATABASE_URL / REDIS_URL.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Check out Source Repository
        uses: actions/checkout@v6
      - name: Get Modified Python Files
        id: changed-python-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            ${{ inputs.working-directory }}/**/*.py
            ${{ inputs.working-directory }}/uv.lock
            ${{ inputs.working-directory }}/pyproject.toml
      - name: Set up Python Environment
        if: steps.changed-python-files.outputs.any_changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Set up uv
        if: steps.changed-python-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install Dependencies
        if: steps.changed-python-files.outputs.any_changed == 'true'
        run: uv sync --extra dev
      - name: Run Tests with Coverage
        if: steps.changed-python-files.outputs.any_changed == 'true'
        run: |
          if [ -n "${{ inputs.coverage-omit }}" ]; then
            uv run pytest --cov=${{ inputs.SRC_PATH }} --cov-omit=${{ inputs.coverage-omit }} --cov-report=xml --cov-report=term -m "${{ inputs.pytest-markers }}" -v ${{ inputs.TESTS_PATH }}
          else
            uv run pytest --cov=${{ inputs.SRC_PATH }} --cov-report=xml --cov-report=term -m "${{ inputs.pytest-markers }}" -v ${{ inputs.TESTS_PATH }}
          fi
      - name: Upload Coverage Report
        if: ${{ steps.changed-python-files.outputs.any_changed == 'true' && github.event_name == 'pull_request' }}
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: ${{ inputs.working-directory }}/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
